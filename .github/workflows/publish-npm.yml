name: Publish npm package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package metadata
        working-directory: packages/auth-kit
        run: |
          node -e 'const pkg=require("./package.json"); const expected="https://github.com/foldspace-stack/casdoor-next-auth-kit"; const errors=[]; if(pkg.name!=="@foldspace-fe/casdoor-next-auth-kit") errors.push("name="+pkg.name); if(!pkg.repository||pkg.repository.url!==expected) errors.push("repository.url="+(pkg.repository&&pkg.repository.url)); if(pkg.homepage!==expected+"#readme") errors.push("homepage="+pkg.homepage); if(!pkg.publishConfig||pkg.publishConfig.access!=="public") errors.push("publishConfig.access"); if(!pkg.publishConfig||pkg.publishConfig.provenance!==true) errors.push("publishConfig.provenance"); if(errors.length){ console.error("Invalid package metadata:", errors.join(", ")); process.exit(1); }'

      - name: Build package
        run: pnpm build:auth-kit

      - name: Smoke test CLI
        working-directory: packages/auth-kit
        run: node ./dist/cli.js --version

      - name: Calculate version
        id: version
        run: |
          node - <<'NODE'
          const { execSync } = require('node:child_process');
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('./packages/auth-kit/package.json', 'utf8'));
          const name = pkg.name;
          const refType = process.env.GITHUB_REF_TYPE ?? '';
          const refName = process.env.GITHUB_REF_NAME ?? '';

          const normalize = (raw) => {
            const value = String(raw).replace(/^v/, '');
            const parts = value.split('.');
            const major = Number(parts[0] ?? 0);
            const minor = Number(parts[1] ?? 0);
            const patch = Number(parts[2] ?? 0);
            return { major, minor, patch };
          };

          const stringify = ({ major, minor, patch }) => `${major}.${minor}.${patch}`;
          const compare = (left, right) => {
            if (left.major !== right.major) return left.major - right.major;
            if (left.minor !== right.minor) return left.minor - right.minor;
            return left.patch - right.patch;
          };
          const bumpPatch = (version) => ({ ...version, patch: version.patch + 1 });
          const maxVersion = (versions) => versions.reduce((acc, version) => (compare(version, acc) > 0 ? version : acc));

          const latestTag = execSync("git tag --list 'v*' --sort=-version:refname | head -n 1", { encoding: 'utf8' }).trim();
          const localBaseline = latestTag ? normalize(latestTag) : normalize('0.1.0');

          let npmBaseline = null;
          try {
            const raw = execSync(`npm view ${JSON.stringify(name)} versions --json`, { encoding: 'utf8' }).trim();
            const parsed = raw ? JSON.parse(raw) : [];
            const list = Array.isArray(parsed) ? parsed : [parsed];
            const filtered = list
              .map((value) => String(value))
              .filter((value) => /^\d+\.\d+\.\d+$/.test(value))
              .map(normalize);
            if (filtered.length > 0) {
              npmBaseline = maxVersion(filtered);
            }
          } catch {
            npmBaseline = null;
          }

          const output = process.env.GITHUB_OUTPUT;
          if (!output) {
            throw new Error('GITHUB_OUTPUT is required');
          }

          const write = (key, value) => {
            fs.appendFileSync(output, `${key}=${value}\n`);
          };

          if (refType === 'tag') {
            const version = normalize(refName);
            write('version', stringify(version));
            write('dist_tag', 'latest');
          } else {
            const base = npmBaseline && compare(npmBaseline, localBaseline) > 0 ? npmBaseline : localBaseline;
            const nextVersion = bumpPatch(base);
            write('version', stringify(nextVersion));
            write('dist_tag', 'next');
          }
          NODE

      - name: Set publish version
        working-directory: packages/auth-kit
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish package
        working-directory: packages/auth-kit
        run: npm publish --access public --provenance --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Promote latest dist-tag
        working-directory: packages/auth-kit
        run: npm dist-tag add "@foldspace-fe/casdoor-next-auth-kit@${{ steps.version.outputs.version }}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
